sample:
  name: Infineon CAT1 MBOX
tests:
  sample.board.infineon.mbox:
    platform_allow:
      - cy8cproto_062_4343w
      - kit_pse84_eval/pse846gps2dbzc4a/m33/ns
      - kit_pse84_eval/pse846gps2dbzc4a/m55
    tags: mbox
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "Ping (on channel 1)"
