sample:
  name: AutAnalog low-power die temperature sensor sample
common:
  tags:
    - adc
    - sensor
  depends_on:
    - adc
  filter: dt_node_has_prop("/zephyr,user","io-channels")

tests:
  sample.boards.infineon.autanalog.lp_temp_sensor:
    platform_allow:
      - kit_pse84_eval/pse846gps2dbzc4a/m55
    integration_platforms:
      - kit_pse84_eval/pse846gps2dbzc4a/m55
    harness: console
    timeout: 30
    harness_config:
      type: multi_line
      regex:
        - "AutAnalog LP die temperature sensor sample"
        - "ADC ready"
        - "ADC Count = \\d+; Temperature \\(degree C\\) = \\d+"
